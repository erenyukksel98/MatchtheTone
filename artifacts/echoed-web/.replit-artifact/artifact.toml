kind = "web"
previewPath = "/"
title = "Echoed — Tone Matcher"
version = "1.0.0"
id = "artifacts/echoed-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19800

[services.development]
run = "pnpm --filter @workspace/echoed-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/echoed-web", "run", "build" ]
publicDir = "artifacts/echoed-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19800"
BASE_PATH = "/"
