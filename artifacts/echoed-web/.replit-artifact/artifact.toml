kind = "web"
previewPath = "/"
title = "Echoed — Tone Matcher"
version = "1.0.0"
id = "artifacts/echoed-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 5000

[services.development]
run = "cd /home/runner/workspace/echoed && flutter run -d web-server --web-port=5000 --web-hostname=0.0.0.0"

[services.production]
build = [ "pnpm", "--filter", "@workspace/echoed-web", "run", "build" ]
publicDir = "artifacts/echoed-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "5000"
BASE_PATH = "/"
